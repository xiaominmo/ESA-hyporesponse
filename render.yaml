services:
  - type: web
    name: esa-decision-support
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9